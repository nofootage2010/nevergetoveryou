<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nevergetoveryou</title>
    <style>
        /* Classic 2000s Web Backgrounds */
        body {
            font-family: "Comic Sans MS", "Arial", sans-serif;
            margin: 0;
            padding: 0 20px 20px 20px;
            background-color: #0336ca; /* Flat vibrant blue */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 95vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Full Header Area covering the top of the website */
        .header-wrapper {
            position: relative;
            width: 100vw;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* Background repository banner stretched to fit the entire top header */
        .repo-bg-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Container centered over the background banner */
        .logo-stack-container {
            position: relative;
            width: 100%;
            max-width: 620px; 
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* WWW Backing GIF */
        .back-gif {
            position: absolute;
            width: 100%;
            max-width: 620px; 
            height: auto;
            border: none;
            z-index: 3; 
        }

        /* Front Logo GIF */
        .front-logo {
            position: relative;
            width: 100%;
            max-width: 520px; 
            height: auto;
            border: none;
            z-index: 4; 
        }

        /* Side Advertisement Columns */
        .side-ad-column {
            position: absolute;
            top: 260px; 
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .ad-left-column {
            left: 20px;
        }

        .ad-right-column {
            right: 20px;
        }

        /* Individual Side Ad Card Styling */
        .side-ad-box {
            width: 100%;
            height: 600px;
            background-color: #000;
            border: 3px inset #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* STRETCH FIX */
        .side-ad-box a,
        .side-ad-box img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill;
        }

        /* Custom Smooth Marquee Container */
        .marquee-container {
            width: 100%;
            max-width: 960px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            background: transparent;
            padding: 5px 0;
            box-sizing: border-box;
            height: 45px;
        }

        /* The track now holds items via relative/absolute offsets natively */
        .marquee-track {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* FIX: Opacity starts at 0 to prevent initial position left-side flashes */
        .marquee-item {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            will-change: transform;
            opacity: 0; 
        }

        /* Top Advertisement Specific Wrapper */
        .top-ad-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        /* Horizontal Advertisement Banner Styling */
        .ad-banner-horizontal {
            width: 100%;
            max-width: 960px; 
            height: 140px; 
            background-color: #000;
            border: 3px inset #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ad-banner-horizontal a {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-banner-horizontal img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill; 
        }

        /* Centered Content Layout */
        .main-content {
            text-align: center;
            max-width: 960px;
            width: 100%;
            margin-top: 0; 
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bottom Ad Container */
        .bottom-ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 20px;
            z-index: 5;
        }

        h1 {
            color: #00ffff;
            font-size: 28px;
            margin: 10px 0 20px 0;
        }

        /* Navigation Button Container */
        .nav-container {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Simple Chunky Button */
        .btn {
            background-color: #ffff00;
            color: #000000;
            border: 3px outset #ffffff;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: "Comic Sans MS", sans-serif;
        }

        .btn:active {
            border: 3px inset #ffffff;
        }

        /* Specific colors for navigation choices */
        .btn-interactives {
            background-color: #ff00ff;
            color: #ffffff;
        }
        
        .btn-videos {
            background-color: #00ff00;
            color: #000000;
        }

        /* Retro Popup/Modal Styles */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .popup-window {
            background-color: #c0c0c0;
            color: #000000;
            border: 3px outset #ffffff;
            width: 400px;
            max-width: 90%;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .popup-header {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .popup-close-btn {
            background-color: #c0c0c0;
            border: 2px outset #ffffff;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        .popup-close-btn:active {
            border: 2px inset #ffffff;
        }

        .popup-body {
            padding: 20px;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 16px;
        }

        /* Status Output Text */
        #message {
            margin-top: 12px;
            font-size: 14px;
            color: #00ff00;
            font-family: monospace;
        }

        /* Web Counter Footer */
        .retro-footer {
            margin-top: 25px;
            border-top: 1px solid #ffffff;
            padding-top: 15px;
            width: 100%;
            max-width: 500px;
        }

        .hit-counter {
            background: #000000;
            color: #ff0000;
            font-family: monospace;
            font-size: 18px;
            padding: 2px 6px;
            display: inline-block;
            margin-top: 5px;
        }

        /* Responsive shift for screens, tablets, and mobile views */
        @media (max-width: 1300px) {
            .side-ad-column {
                position: relative;
                top: 0;
                width: 100%;
                max-width: 300px;
                left: 0;
                right: 0;
                margin: 20px auto;
            }
            .side-ad-box {
                height: 250px;
            }
        }

        @media (max-width: 650px) {
            .header-wrapper {
                min-height: 140px;
            }
            .logo-stack-container {
                height: 120px;
                max-width: 90%;
            }
            .ad-banner-horizontal {
                height: 90px;
            }
            h1 {
                font-size: 22px;
            }
            .nav-container {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <img src="Advertisements/Banner.png" alt="Header Background Banner" class="repo-bg-banner">
        <div class="logo-stack-container">
            <img src="WWW.gif" alt="WWW Background Graphic" class="back-gif">
            <img src="logo.gif" alt="Site Logo" class="front-logo">
        </div>
    </div>

    <div class="side-ad-column ad-left-column" id="leftAdContainer"></div>
    <div class="side-ad-column ad-right-column" id="rightAdContainer"></div>

    <div class="main-content">
        
        <div class="marquee-container" id="marqueeWrapper">
            <div class="marquee-track" id="scrollingTrack"></div>
        </div>

        <div class="top-ad-wrapper">
            <div class="ad-banner-horizontal">
                <a href="#"><img id="topAdImg" src="" alt="Top Advertisement"></a>
            </div>
        </div>

        <h1>💥 title 💥</h1>
        
        <div class="nav-container">
            <button class="btn btn-interactives" id="interactivesBtn">👾 Interactives</button>
            <button class="btn btn-videos" id="videosBtn">🎬 Videos</button>
        </div>
        
        <p id="message">[- Awaiting Interactive Input -]</p>

        <div class="retro-footer">
            <div>YOU ARE VISITOR NUMBER:</div>
            <div class="hit-counter" id="countBox">0024791</div>
        </div>

    </div>

    <div class="bottom-ad-container">
        <div class="ad-banner-horizontal">
            <a href="#"><img id="bottomAdImg" src="" alt="Bottom Advertisement"></a>
        </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-window">
            <div class="popup-header">
                <span id="popupTitle">System Alert</span>
                <button class="popup-close-btn" id="popupClose">X</button>
            </div>
            <div class="popup-body" id="popupBody">
                </div>
        </div>
    </div>

    <script>
        // --- EDITABLE CONFIGURATIONS ---
        const SIDE_AD_COUNT = 3; 
        const GITHUB_OWNER = "nofootage2010"; 
        const GITHUB_REPO = "nevergetoveryou";       
        const AD_FOLDER_PATH = "Advertisements";

        // --- MARQUEE SPEED CONFIGURATION ---
        const MARQUEE_SPEED = 2.5; 
        
        // Safety gap space (in pixels) between sentences so they don't crash into each other
        const MARQUEE_GAP = 120; 

        // --- EDITABLE SENTENCES TABLE ---
        const randomSentences = [
            "Welcome to G.T.A. kid.. If you have dreams... consider them gone.",
            "Hercules Hercules!",
            "Korolotosophonic parasitic creations of god!",
            "Multeralastic KneeKiller, a contagious disease spreading through Rigorlia!",
            "Water Pacific creating is found new Pulpetalios! Nice What Creatures?.."
        ];

        let horizontalAds = [];
        let verticalAds = [];

        function getRandomElement(arr) {
            if (arr.length === 0) return '';
            const randomIndex = Math.floor(Math.random() * arr.length);
            return arr[randomIndex];
        }

        // Custom Queue-Based Marquee Engine
        function initSeamlessMarquee() {
            const container = document.getElementById('marqueeWrapper');
            const track = document.getElementById('scrollingTrack');
            
            let containerWidth = container.offsetWidth;
            let activeSpans = [];

            // Spawns a fresh randomized item into our scrolling array
            function spawnSentenceItem(startX) {
                const span = document.createElement('span');
                span.className = 'marquee-item';
                span.textContent = getRandomElement(randomSentences);
                track.appendChild(span);
                
                return {
                    element: span,
                    x: startX,
                    width: 0,
                    computed: false
                };
            }

            // Seed the initial item right at the edge of the container
            activeSpans.push(spawnSentenceItem(containerWidth));

            function animate() {
                // Loop backwards so we can safely delete objects out of the array mid-loop
                for (let i = activeSpans.length - 1; i >= 0; i--) {
                    let item = activeSpans[i];
                    
                    // Move the position leftwards
                    item.x -= MARQUEE_SPEED;
                    
                    // Measure element width dynamically once it loads into the DOM
                    if (!item.computed) {
                        item.width = item.element.offsetWidth;
                        if (item.width > 0) {
                            item.computed = true;
                            // FIX: Only make element visible once its width is computed and transform coordinates apply
                            item.element.style.opacity = "1";
                        }
                    }

                    // Apply the movement update instantly via CSS transform
                    item.element.style.transform = `translateX(${item.x}px)`;

                    // CLEANUP: Delete ONLY when the tail end goes entirely off the screen (< 0)
                    if (item.computed && (item.x + item.width) < 0) {
                        item.element.remove();
                        activeSpans.splice(i, 1);
                    }
                }

                // SPAWN CHECK: Look at the very last sentence in the list
                if (activeSpans.length > 0) {
                    let lastItem = activeSpans[activeSpans.length - 1];
                    
                    if (lastItem.computed) {
                        // Calculate where the trailing edge of the last sentence is right now
                        let lastItemTail = lastItem.x + lastItem.width;
                        
                        // If it has cleared enough space below the container edge, cue up the next sentence seamlessly
                        if (lastItemTail < (containerWidth - MARQUEE_GAP)) {
                            // Start the next item right behind it plus your defined gap
                            let nextStartX = Math.max(containerWidth, lastItemTail + MARQUEE_GAP);
                            activeSpans.push(spawnSentenceItem(nextStartX));
                        }
                    }
                } else {
                    activeSpans.push(spawnSentenceItem(containerWidth));
                }

                requestAnimationFrame(animate);
            }

            // Window resize adjustment check
            window.addEventListener('resize', () => {
                containerWidth = container.offsetWidth;
            });

            requestAnimationFrame(animate);
        }

        // Generates structural vertical elements dynamically
        function generateSideAds(containerId, count) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            
            for (let i = 0; i < count; i++) {
                const adBox = document.createElement('div');
                adBox.className = 'side-ad-box';
                
                const adLink = document.createElement('a');
                adLink.href = '#';
                
                const adImg = document.createElement('img');
                adImg.alt = 'Side Advertisement';
                adImg.className = 'dynamic-side-img'; 
                
                adLink.appendChild(adImg);
                adBox.appendChild(adLink);
                container.appendChild(adBox);
            }
        }

        // Fetches from GitHub repository and filters based on filename ending rules
        async function fetchAdsFromGitHub() {
            const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${AD_FOLDER_PATH}`;
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Repository folder missing or private');
                
                const files = await response.json();
                
                files.forEach(file => {
                    if (file.type === 'file' && /\.(gif|png|jpe?g)$/i.test(file.name)) {
                        const localPath = `${AD_FOLDER_PATH}/${file.name}`;
                        const nameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.'));
                        
                        if (nameWithoutExt.toLowerCase().endsWith('_h')) {
                            horizontalAds.push(localPath);
                        } else if (nameWithoutExt.toLowerCase().endsWith('_v')) {
                            verticalAds.push(localPath);
                        }
                    }
                });

            } catch (error) {
                console.warn("Could not read GitHub repository contents directly.", error);
            } finally {
                if (horizontalAds.length > 0) {
                    document.getElementById('topAdImg').src = getRandomElement(horizontalAds);
                    document.getElementById('bottomAdImg').src = getRandomElement(horizontalAds);
                }
                
                if (verticalAds.length > 0) {
                    document.querySelectorAll('.dynamic-side-img').forEach(img => {
                        img.src = getRandomElement(verticalAds);
                    });
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initSeamlessMarquee();
            generateSideAds('leftAdContainer', SIDE_AD_COUNT);
            generateSideAds('rightAdContainer', SIDE_AD_COUNT);
            fetchAdsFromGitHub();
        });

        // POPUP LOGIC FOR THE NEW BUTTONS
        const overlay = document.getElementById('popupOverlay');
        const popupTitle = document.getElementById('popupTitle');
        const popupBody = document.getElementById('popupBody');
        const closeBtn = document.getElementById('popupClose');
        const msgStatus = document.getElementById('message');
        const countBox = document.getElementById('countBox');

        function updateVisitorCount() {
            const currentCount = parseInt(countBox.textContent, 10);
            countBox.textContent = String(currentCount + 1).padStart(7, '0');
        }

        // Click Interactives
        document.getElementById('interactivesBtn').addEventListener('click', function() {
            popupTitle.textContent = "🎮 Loading Interactives... 🎮";
            popupBody.innerHTML = `
                <p style="color: #000; font-weight: normal;">Your interactive game/app code will go here!</p>
                <div style="background: #000; color: #00ff00; padding: 10px; font-family: monospace; border: 2px inset #fff;">
                    // TODO: Paste your script or interactive object frames here
                </div>
            `;
            overlay.style.display = 'flex';
            msgStatus.innerHTML = `★ SELECTION: Interactives loaded at ${new Date().toLocaleTimeString()} ★`;
            updateVisitorCount();
        });

        // Click Videos
        document.getElementById('videosBtn').addEventListener('click', function() {
            popupTitle.textContent = "📺 Loading Videos... 📺";
            popupBody.innerHTML = `
                <p style="color: #000; font-weight: normal;">Your media/video embed frames go here!</p>
                <div style="border: 3px dashed #ff0000; padding: 15px; color: #ff0000; font-weight: bold;">
                    [ Insert Video Player / YouTube Embed / WebM Code Here ]
                </div>
            `;
            overlay.style.display = 'flex';
            msgStatus.innerHTML = `★ SELECTION: Videos loaded at ${new Date().toLocaleTimeString()} ★`;
            updateVisitorCount();
        });

        // Close Popup Window
        closeBtn.addEventListener('click', function() {
            overlay.style.display = 'none';
        });

        // Close on backing frame click
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                overlay.style.display = 'none';
            }
        });
    </script>

</body>
</html>
