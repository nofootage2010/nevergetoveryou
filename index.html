<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ :: WELCOME TO MY PROZZAK-STYLE PAGES TEST :: ⚡</title>
    <style>
        /* Classic 2000s Web Background */
        body {
            font-family: "Comic Sans MS", "Arial", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0336ca; /* Flat vibrant blue */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 95vh;
        }

        /* Container to group and center the layered top-left graphics */
        .logo-stack-container {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 620px; /* Big enough to clear the oversized background GIF */
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* New WWW Backing GIF (Larger, centered behind the main logo) */
        .back-gif {
            position: absolute;
            width: 100%;
            max-width: 620px; /* Bigger than the front logo */
            height: auto;
            border: none;
            z-index: 1; /* Sits behind the logo */
        }

        /* Front Logo GIF (520px wide, sits on top) */
        .front-logo {
            position: relative;
            width: 100%;
            max-width: 520px; 
            height: auto;
            border: none;
            z-index: 2; /* Sits on top of the WWW background */
        }

        /* Retro Advertisement Banner Styling */
        .ad-banner {
            width: 468px;
            height: 60px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: 3px inset #ffffff;
            color: #000000;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px auto;
            text-transform: uppercase;
            font-size: 14px;
            box-shadow: 5px 5px 0px #000000;
        }

        .ad-banner a {
            color: #000000;
            text-decoration: none;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Simple Centered Content Layout */
        .main-content {
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-top: 480px; /* Pushes content down so the giant top-left logos don't overlap it */
        }

        /* Responsive shift for narrower screens/mobile views */
        @media (max-width: 1200px) {
            .logo-stack-container {
                position: relative;
                top: 0;
                left: 0;
                width: 100%;
                max-width: 620px;
                margin-bottom: 20px;
            }
            .main-content {
                margin-top: 0;
            }
            .ad-banner {
                width: 100%;
                max-width: 468px;
            }
        }

        h1 {
            color: #00ffff;
            font-size: 28px;
            margin: 10px 0;
        }

        p {
            color: #ffff00;
            font-size: 16px;
            font-weight: bold;
        }

        /* Simple Chunky Button */
        .btn {
            background-color: #ffff00;
            color: #000000;
            border: 3px outset #ffffff;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active {
            border: 3px inset #ffffff;
        }

        /* Status Output Text */
        #message {
            margin-top: 15px;
            font-size: 14px;
            color: #00ff00;
            font-family: monospace;
        }

        /* Web Counter Footer */
        .retro-footer {
            margin-top: 40px;
            border-top: 1px solid #ffffff;
            padding-top: 15px;
        }

        .hit-counter {
            background: #000000;
            color: #ff0000;
            font-family: monospace;
            font-size: 18px;
            padding: 2px 6px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="logo-stack-container">
        <img src="WWW.gif" alt="WWW Background Graphic" class="back-gif">
        <img src="logo.gif" alt="Site Logo" class="front-logo">
    </div>

    <div class="main-content">
        
        <marquee scrollamount="4">⚡⚡⚡ WELCOME TO THE ULTIMATE INTERACTIVE PORTAL! HOT SHOW IN PROGRESS! ⚡⚡⚡</marquee>

        <div class="ad-banner">
            <a href="#">🔥 FREE DOWNLOADS! CLICK HERE NOW! 🔥</a>
        </div>

        <h1>💥 title 💥</h1>
        
        <p>// ergergregrgerg //</p>
        <p>wergergregergergerg</p>
        
        <button class="btn" id="actionBtn">💥 HIT ME! 💥</button>
        <p id="message">[- Awaiting Interactive Input -]</p>

        <div class="ad-banner" style="background: linear-gradient(45deg, #ffcc00, #ff0000);">
            <a href="#">⚠️ WARNING: YOUR PC IS NOT OPTIMIZED! CLICK TO FIX! ⚠️</a>
        </div>

        <div class="retro-footer">
            <div>YOU ARE VISITOR NUMBER:</div>
            <div class="hit-counter" id="countBox">0024791</div>
        </div>

    </div>

    <script>
        document.getElementById('actionBtn').addEventListener('click', function() {
            const time = new Date().toLocaleTimeString();
            document.getElementById('message').innerHTML = `★ SUCCESS! ★ LINK ESTABLISHED AT: ${time}`;
            
            const currentCount = parseInt(document.getElementById('countBox').textContent, 10);
            document.getElementById('countBox').textContent = String(currentCount + 1).padStart(7, '0');
        });
    </script>

</body>
</html>
