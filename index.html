<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ :: WELCOME TO MY PROZZAK-STYLE PAGES TEST :: ⚡</title>
    <style>
        /* Classic 2000s Web Backgrounds */
        body {
            font-family: "Comic Sans MS", "Arial", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0336ca; /* Flat vibrant blue */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 95vh;
            position: relative;
        }

        /* Container to group and center the layered top-left graphics */
        .logo-stack-container {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 620px; 
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* WWW Backing GIF */
        .back-gif {
            position: absolute;
            width: 100%;
            max-width: 620px; 
            height: auto;
            border: none;
            z-index: 1; 
        }

        /* Front Logo GIF */
        .front-logo {
            position: relative;
            width: 100%;
            max-width: 520px; 
            height: auto;
            border: none;
            z-index: 2; 
        }

        /* Side Advertisement Columns */
        .side-ad-column {
            position: absolute;
            top: 220px; 
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .ad-left-column {
            left: 20px;
        }

        .ad-right-column {
            right: 20px;
        }

        /* Individual Side Ad Card Styling */
        .side-ad-box {
            width: 100%;
            height: 600px;
            background-color: #000;
            border: 3px inset #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* FIX: Force vertical images to stretch completely to fill the box dimensions */
        .side-ad-box a,
        .side-ad-box img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill;
        }

        /* Top Advertisement Specific Wrapper */
        .top-ad-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        /* Horizontal Advertisement Banner Styling */
        .ad-banner-horizontal {
            width: 100%;
            max-width: 960px; 
            height: 90px; 
            background-color: #000;
            border: 3px inset #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ad-banner-horizontal a {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-banner-horizontal img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill; 
        }

        /* Centered Content Layout */
        .main-content {
            text-align: center;
            max-width: 960px;
            width: 100%;
            margin-top: 200px; 
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bottom Ad Container */
        .bottom-ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 20px;
            z-index: 5;
        }

        /* Responsive shift for narrower screens/mobile views */
        @media (max-width: 1200px) {
            .logo-stack-container {
                position: relative;
                top: 0;
                left: 0;
                width: 100%;
                max-width: 620px;
                margin-bottom: 20px;
            }
            .main-content {
                margin-top: 0;
            }
            .side-ad-column {
                position: relative;
                top: 0;
                width: 100%;
                max-width: 300px;
                left: 0;
                right: 0;
                margin: 20px auto;
            }
            .side-ad-box {
                height: 250px;
            }
            .ad-banner-horizontal {
                max-width: 90%;
            }
        }

        h1 {
            color: #00ffff;
            font-size: 28px;
            margin: 10px 0;
        }

        p {
            color: #ffff00;
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0;
        }

        /* Simple Chunky Button */
        .btn {
            background-color: #ffff00;
            color: #000000;
            border: 3px outset #ffffff;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:active {
            border: 3px inset #ffffff;
        }

        /* Status Output Text */
        #message {
            margin-top: 12px;
            font-size: 14px;
            color: #00ff00;
            font-family: monospace;
        }

        /* Web Counter Footer */
        .retro-footer {
            margin-top: 25px;
            border-top: 1px solid #ffffff;
            padding-top: 15px;
            width: 100%;
            max-width: 500px;
        }

        .hit-counter {
            background: #000000;
            color: #ff0000;
            font-family: monospace;
            font-size: 18px;
            padding: 2px 6px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="logo-stack-container">
        <img src="WWW.gif" alt="WWW Background Graphic" class="back-gif">
        <img src="logo.gif" alt="Site Logo" class="front-logo">
    </div>

    <div class="side-ad-column ad-left-column" id="leftAdContainer"></div>
    <div class="side-ad-column ad-right-column" id="rightAdContainer"></div>

    <div class="main-content">
        
        <marquee scrollamount="4">⚡⚡⚡ WELCOME TO THE ULTIMATE INTERACTIVE PORTAL! HOT SHOW IN PROGRESS! ⚡⚡⚡</marquee>

        <div class="top-ad-wrapper">
            <div class="ad-banner-horizontal">
                <a href="#"><img id="topAdImg" src="" alt="Top Advertisement"></a>
            </div>
        </div>

        <h1>💥 title 💥</h1>
        
        <p>// ergergregrgerg //</p>
        <p>wergergregrgergerg</p>
        
        <button class="btn" id="actionBtn">💥 HIT ME! 💥</button>
        <p id="message">[- Awaiting Interactive Input -]</p>

        <div class="retro-footer">
            <div>YOU ARE VISITOR NUMBER:</div>
            <div class="hit-counter" id="countBox">0024791</div>
        </div>

    </div>

    <div class="bottom-ad-container">
        <div class="ad-banner-horizontal">
            <a href="#"><img id="bottomAdImg" src="" alt="Bottom Advertisement"></a>
        </div>
    </div>

    <script>
        // --- EDITABLE CONFIGURATIONS ---
        const SIDE_AD_COUNT = 3; 
        const GITHUB_OWNER = "nofootage2010"; // <-- Change to your GitHub Username
        const GITHUB_REPO = "nevergetoveryou";       // <-- Change to your Repository Name
        const AD_FOLDER_PATH = "Advertisements";

        // Fallbacks in case the fetch fails or folder is empty
        let horizontalAds = [];
        let verticalAds = [];

        function getRandomAd(adArray) {
            if (adArray.length === 0) return '';
            const randomIndex = Math.floor(Math.random() * adArray.length);
            return adArray[randomIndex];
        }

        // Generates placeholder slots that will be populated once files are sorted
        function generateSideAds(containerId, count) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            
            for (let i = 0; i < count; i++) {
                const adBox = document.createElement('div');
                adBox.className = 'side-ad-box';
                
                const adLink = document.createElement('a');
                adLink.href = '#';
                
                const adImg = document.createElement('img');
                adImg.alt = 'Side Advertisement';
                adImg.className = 'dynamic-side-img'; 
                
                adLink.appendChild(adImg);
                adBox.appendChild(adLink);
                container.appendChild(adBox);
            }
        }

        // Fetches from GitHub repository and filters based on filename ending rules
        async function fetchAdsFromGitHub() {
            const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${AD_FOLDER_PATH}`;
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Repository folder missing or private');
                
                const files = await response.json();
                
                files.forEach(file => {
                    // Check if file is an image/gif
                    if (file.type === 'file' && /\.(gif|png|jpe?g)$/i.test(file.name)) {
                        const localPath = `${AD_FOLDER_PATH}/${file.name}`;
                        
                        // Extract base name without extension to evaluate ending patterns
                        const nameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.'));
                        
                        // Match ending characters: checks if it ends with '_h' or '_v'
                        if (nameWithoutExt.toLowerCase().endsWith('_h')) {
                            horizontalAds.push(localPath);
                        } else if (nameWithoutExt.toLowerCase().endsWith('_v')) {
                            verticalAds.push(localPath);
                        }
                    }
                });

            } catch (error) {
                console.warn("Could not read GitHub repository contents directly. Checking configs...", error);
            } finally {
                // Apply final sorted random paths to layout elements
                if (horizontalAds.length > 0) {
                    document.getElementById('topAdImg').src = getRandomAd(horizontalAds);
                    document.getElementById('bottomAdImg').src = getRandomAd(horizontalAds);
                }
                
                if (verticalAds.length > 0) {
                    document.querySelectorAll('.dynamic-side-img').forEach(img => {
                        img.src = getRandomAd(verticalAds);
                    });
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            generateSideAds('leftAdContainer', SIDE_AD_COUNT);
            generateSideAds('rightAdContainer', SIDE_AD_COUNT);
            fetchAdsFromGitHub();
        });

        document.getElementById('actionBtn').addEventListener('click', function() {
            const time = new Date().toLocaleTimeString();
            document.getElementById('message').innerHTML = `★ SUCCESS! ★ LINK ESTABLISHED AT: ${time}`;
            
            const currentCount = parseInt(document.getElementById('countBox').textContent, 10);
            document.getElementById('countBox').textContent = String(currentCount + 1).padStart(7, '0');
        });
    </script>

</body>
</html>
