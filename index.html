<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ :: WELCOME TO MY PROZZAK-STYLE PAGES TEST :: ⚡</title>
    <style>
        /* Classic 2000s Web Background */
        body {
            font-family: "Comic Sans MS", "Arial", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0336ca; /* Flat vibrant blue */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 95vh;
            position: relative;
        }

        /* Container to group and center the layered top-left graphics */
        .logo-stack-container {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 620px; /* Big enough to clear the oversized background GIF */
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* New WWW Backing GIF (Larger, centered behind the main logo) */
        .back-gif {
            position: absolute;
            width: 100%;
            max-width: 620px; /* Bigger than the front logo */
            height: auto;
            border: none;
            z-index: 1; /* Sits behind the logo */
        }

        /* Front Logo GIF (520px wide, sits on top) */
        .front-logo {
            position: relative;
            width: 100%;
            max-width: 520px; 
            height: auto;
            border: none;
            z-index: 2; /* Sits on top of the WWW background */
        }

        /* Side Advertisement Columns (Scrollable Containers) */
        .side-ad-column {
            position: absolute;
            top: 20px;
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .ad-left-column {
            left: 20px;
        }

        .ad-right-column {
            right: 20px;
        }

        /* Individual Side Ad Card Styling */
        .side-ad-box {
            width: 100%;
            height: 600px;
            background-color: #000;
            border: 3px inset #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .side-ad-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Horizontal Advertisement Banner Scaling Improvements */
        .ad-banner-horizontal {
            width: 100%;
            max-width: 728px; /* Standard leaderboard banner sizing */
            height: auto;
            min-height: 90px;
            background-color: #000;
            border: 3px inset #ffffff;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ad-banner-horizontal a,
        .ad-banner-horizontal img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* Scales proportionally inside the container */
        }

        /* Simple Centered Content Layout */
        .main-content {
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-top: 480px; /* Pushes content down so the giant top-left logos don't overlap it */
            position: relative;
            z-index: 5;
        }

        /* Responsive shift for narrower screens/mobile views */
        @media (max-width: 1200px) {
            .logo-stack-container {
                position: relative;
                top: 0;
                left: 0;
                width: 100%;
                max-width: 620px;
                margin-bottom: 20px;
            }
            .main-content {
                margin-top: 0;
            }
            .side-ad-column {
                position: relative;
                top: 0;
                width: 100%;
                max-width: 300px;
                left: 0;
                right: 0;
                margin: 20px auto;
            }
            .side-ad-box {
                height: 250px;
            }
        }

        h1 {
            color: #00ffff;
            font-size: 28px;
            margin: 10px 0;
        }

        p {
            color: #ffff00;
            font-size: 16px;
            font-weight: bold;
        }

        /* Simple Chunky Button */
        .btn {
            background-color: #ffff00;
            color: #000000;
            border: 3px outset #ffffff;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active {
            border: 3px inset #ffffff;
        }

        /* Status Output Text */
        #message {
            margin-top: 15px;
            font-size: 14px;
            color: #00ff00;
            font-family: monospace;
        }

        /* Web Counter Footer */
        .retro-footer {
            margin-top: 40px;
            border-top: 1px solid #ffffff;
            padding-top: 15px;
        }

        .hit-counter {
            background: #000000;
            color: #ff0000;
            font-family: monospace;
            font-size: 18px;
            padding: 2px 6px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="logo-stack-container">
        <img src="WWW.gif" alt="WWW Background Graphic" class="back-gif">
        <img src="logo.gif" alt="Site Logo" class="front-logo">
    </div>

    <div class="side-ad-column ad-left-column" id="leftAdContainer"></div>
    <div class="side-ad-column ad-right-column" id="rightAdContainer"></div>

    <div class="main-content">
        
        <marquee scrollamount="4">⚡⚡⚡ WELCOME TO THE ULTIMATE INTERACTIVE PORTAL! HOT SHOW IN PROGRESS! ⚡⚡⚡</marquee>

        <div class="ad-banner-horizontal">
            <a href="#"><img id="topAdImg" src="" alt="Top Advertisement"></a>
        </div>

        <h1>💥 title 💥</h1>
        
        <p>// ergergregrgerg //</p>
        <p>wergergregergergerg</p>
        
        <button class="btn" id="actionBtn">💥 HIT ME! 💥</button>
        <p id="message">[- Awaiting Interactive Input -]</p>

        <div class="ad-banner-horizontal">
            <a href="#"><img id="bottomAdImg" src="" alt="Bottom Advertisement"></a>
        </div>

        <div class="retro-footer">
            <div>YOU ARE VISITOR NUMBER:</div>
            <div class="hit-counter" id="countBox">0024791</div>
        </div>

    </div>

    <script>
        // --- EDITABLE CONFIGURATION NUMBER ---
        const SIDE_AD_COUNT = 3; // Change this number to increase or decrease the amount of stacked side ads
        
        // Array configurations referencing images inside your local advertisements folder
        const horizontalAds = [
            'advertisements/banner1.gif',
            'advertisements/banner2.gif',
            'advertisements/banner3.gif'
        ];

        const verticalAds = [
            'advertisements/side1.gif',
            'advertisements/side2.gif',
            'advertisements/side3.gif'
        ];

        // Function to select a random item from an array
        function getRandomAd(adArray) {
            const randomIndex = Math.floor(Math.random() * adArray.length);
            return adArray[randomIndex];
        }

        // Function to dynamically generate stacked side advertisements
        function generateSideAds(containerId, count) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; // Clear original placeholders
            
            for (let i = 0; i < count; i++) {
                const adBox = document.createElement('div');
                adBox.className = 'side-ad-box';
                
                const adLink = document.createElement('a');
                adLink.href = '#';
                
                const adImg = document.createElement('img');
                adImg.src = getRandomAd(verticalAds);
                adImg.alt = 'Side Advertisement';
                
                adLink.appendChild(adImg);
                adBox.appendChild(adLink);
                container.appendChild(adBox);
            }
        }

        // Apply randomized sources once the window loads
        window.addEventListener('DOMContentLoaded', () => {
            // Set scaling top and bottom banners
            document.getElementById('topAdImg').src = getRandomAd(horizontalAds);
            document.getElementById('bottomAdImg').src = getRandomAd(horizontalAds);
            
            // Build the dynamic columns based on SIDE_AD_COUNT
            generateSideAds('leftAdContainer', SIDE_AD_COUNT);
            generateSideAds('rightAdContainer', SIDE_AD_COUNT);
        });

        // Hit Button Functionality
        document.getElementById('actionBtn').addEventListener('click', function() {
            const time = new Date().toLocaleTimeString();
            document.getElementById('message').innerHTML = `★ SUCCESS! ★ LINK ESTABLISHED AT: ${time}`;
            
            const currentCount = parseInt(document.getElementById('countBox').textContent, 10);
            document.getElementById('countBox').textContent = String(currentCount + 1).padStart(7, '0');
        });
    </script>

</body>
</html>
