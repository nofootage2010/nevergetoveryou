<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Pages Test Site</title>
    <style>
        /* Base styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container box */
        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #24292e;
            margin-bottom: 10px;
        }

        p {
            color: #586069;
            font-size: 16px;
            line-height: 1.5;
        }

        /* Interactive Button */
        .btn {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #2c974b;
        }

        /* Timestamp message */
        #message {
            margin-top: 15px;
            font-weight: bold;
            color: #0366d6;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 GitHub Pages Test</h1>
        <p>Your website hosting is working successfully! Click the button below to test interactivity.</p>
        
        <button class="btn" id="actionBtn">Click Me</button>
        <p id="message"></p>
    </div>

    <script>
        // Simple interactive script
        document.getElementById('actionBtn').addEventListener('click', function() {
            const time = new Date().toLocaleTimeString();
            document.getElementById('message').textContent = `Success! Last clicked at ${time}`;
        });
    </script>

</body>
</html>
