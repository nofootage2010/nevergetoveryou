<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ :: WELCOME TO MY PROZZAK-STYLE PAGES TEST :: ⚡</title>
    <style>
        /* Classic 2000s Web Background */
        body {
            font-family: "Comic Sans MS", "Arial", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0336ca; /* Flat vibrant blue */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 95vh;
        }

        /* Top-Left Floating Logo */
        .site-logo {
            position: absolute;
            top: 15px;
            left: 15px;
            max-width: 100px;
            height: auto;
            border: 2px solid #ffff00;
        }

        /* Simple Centered Content Layout */
        .main-content {
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-top: 80px; /* Prevents logo overlap on small screens */
        }

        h1 {
            color: #00ffff;
            font-size: 28px;
            margin: 10px 0;
        }

        p {
            color: #ffff00;
            font-size: 16px;
            font-weight: bold;
        }

        /* Simple Chunky Button */
        .btn {
            background-color: #ffff00;
            color: #000000;
            border: 3px outset #ffffff;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active {
            border: 3px inset #ffffff;
        }

        /* Status Output Text */
        #message {
            margin-top: 15px;
            font-size: 14px;
            color: #00ff00;
            font-family: monospace;
        }

        /* Web Counter Footer */
        .retro-footer {
            margin-top: 40px;
            border-top: 1px solid #ffffff;
            padding-top: 15px;
        }

        .hit-counter {
            background: #000000;
            color: #ff0000;
            font-family: monospace;
            font-size: 18px;
            padding: 2px 6px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Logo linked correctly via your root folder structure -->
    <img src="logo.gif" alt="Site Logo" class="site-logo">

    <!-- Clean Portal Layout -->
    <div class="main-content">
        
        <marquee scrollamount="4">⚡⚡⚡ WELCOME TO THE ULTIMATE INTERACTIVE PORTAL! HOT SHOW IN PROGRESS! ⚡⚡⚡</marquee>

        <h1>💥 PROZZÄK-PAGES 💥</h1>
        
        <p>// STATION ID: CHU_2_PPL //</p>
        <p>Your Geocities-tier GitHub hosting engine is fully loaded and ready for action. Let's make out!</p>
        
        <button class="btn" id="actionBtn">💥 HIT ME! 💥</button>
        <p id="message">[- Awaiting Interactive Input -]</p>

        <div class="retro-footer">
            <div>YOU ARE VISITOR NUMBER:</div>
            <div class="hit-counter" id="countBox">0024791</div>
        </div>

    </div>

    <script>
        document.getElementById('actionBtn').addEventListener('click', function() {
            const time = new Date().toLocaleTimeString();
            document.getElementById('message').innerHTML = `★ SUCCESS! ★ LINK ESTABLISHED AT: ${time}`;
            
            const currentCount = parseInt(document.getElementById('countBox').textContent, 10);
            document.getElementById('countBox').textContent = String(currentCount + 1).padStart(7, '0');
        });
    </script>

</body>
</html>
