<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ :: WELCOME TO MY PROZZAK-STYLE PAGES TEST :: ⚡</title>
    <style>
        /* Classic 2000s Web Backgrounds */
        body {
            font-family: "Comic Sans MS", "Arial", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0336ca; /* Flat vibrant blue */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 95vh;
            position: relative;
        }

        /* Container to group and center the layered top-left graphics */
        .logo-stack-container {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 620px; 
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* WWW Backing GIF */
        .back-gif {
            position: absolute;
            width: 100%;
            max-width: 620px; 
            height: auto;
            border: none;
            z-index: 1; 
        }

        /* Front Logo GIF */
        .front-logo {
            position: relative;
            width: 100%;
            max-width: 520px; 
            height: auto;
            border: none;
            z-index: 2; 
        }

        /* Side Advertisement Columns */
        .side-ad-column {
            position: absolute;
            top: 220px; 
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .ad-left-column {
            left: 20px;
        }

        .ad-right-column {
            right: 20px;
        }

        /* Individual Side Ad Card Styling */
        .side-ad-box {
            width: 100%;
            height: 600px;
            background-color: #000;
            border: 3px inset #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* STRETCH FIX */
        .side-ad-box a,
        .side-ad-box img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill;
        }

        /* Custom Modern Smooth Marquee Container */
        .marquee-container {
            width: 100%;
            max-width: 960px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            background: transparent;
            padding: 5px 0;
            box-sizing: border-box;
            height: 35px;
        }

        .marquee-track {
            display: inline-block;
            position: absolute;
            white-space: nowrap;
            will-change: transform;
        }

        /* Top Advertisement Specific Wrapper */
        .top-ad-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        /* Horizontal Advertisement Banner Styling */
        .ad-banner-horizontal {
            width: 100%;
            max-width: 960px; 
            height: 90px; 
            background-color: #000;
            border: 3px inset #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ad-banner-horizontal a {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-banner-horizontal img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill; 
        }

        /* Centered Content Layout */
        .main-content {
            text-align: center;
            max-width: 960px;
            width: 100%;
            margin-top: 200px; 
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bottom Ad Container */
        .bottom-ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 20px;
            z-index: 5;
        }

        /* Responsive shift for narrower screens/mobile views */
        @media (max-width: 1200px) {
            .logo-stack-container {
                position: relative;
                top: 0;
                left: 0;
                width: 100%;
                max-width: 620px;
                margin-bottom: 20px;
            }
            .main-content {
                margin-top: 0;
            }
            .side-ad-column {
                position: relative;
                top: 0;
                width: 100%;
                max-width: 300px;
                left: 0;
                right: 0;
                margin: 20px auto;
            }
            .side-ad-box {
                height: 250px;
            }
            .ad-banner-horizontal {
                max-width: 90%;
            }
        }

        h1 {
            color: #00ffff;
            font-size: 28px;
            margin: 10px 0;
        }

        p {
            color: #ffff00;
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0;
        }

        /* Simple Chunky Button */
        .btn {
            background-color: #ffff00;
            color: #000000;
            border: 3px outset #ffffff;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:active {
            border: 3px inset #ffffff;
        }

        /* Status Output Text */
        #message {
            margin-top: 12px;
            font-size: 14px;
            color: #00ff00;
            font-family: monospace;
        }

        /* Web Counter Footer */
        .retro-footer {
            margin-top: 25px;
            border-top: 1px solid #ffffff;
            padding-top: 15px;
            width: 100%;
            max-width: 500px;
        }

        .hit-counter {
            background: #000000;
            color: #ff0000;
            font-family: monospace;
            font-size: 18px;
            padding: 2px 6px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="logo-stack-container">
        <img src="WWW.gif" alt="WWW Background Graphic" class="back-gif">
        <img src="logo.gif" alt="Site Logo" class="front-logo">
    </div>

    <div class="side-ad-column ad-left-column" id="leftAdContainer"></div>
    <div class="side-ad-column ad-right-column" id="rightAdContainer"></div>

    <div class="main-content">
        
        <div class="marquee-container" id="marqueeWrapper">
            <div class="marquee-track" id="scrollingTrack"></div>
        </div>

        <div class="top-ad-wrapper">
            <div class="ad-banner-horizontal">
                <a href="#"><img id="topAdImg" src="" alt="Top Advertisement"></a>
            </div>
        </div>

        <h1>💥 title 💥</h1>
        
        <p>// ergergregrgerg //</p>
        <p>wergergregrgergerg</p>
        
        <button class="btn" id="actionBtn">💥 HIT ME! 💥</button>
        <p id="message">[- Awaiting Interactive Input -]</p>

        <div class="retro-footer">
            <div>YOU ARE VISITOR NUMBER:</div>
            <div class="hit-counter" id="countBox">0024791</div>
        </div>

    </div>

    <div class="bottom-ad-container">
        <div class="ad-banner-horizontal">
            <a href="#"><img id="bottomAdImg" src="" alt="Bottom Advertisement"></a>
        </div>
    </div>

    <script>
        // --- EDITABLE CONFIGURATIONS ---
        const SIDE_AD_COUNT = 3; 
        const GITHUB_OWNER = "nofootage2010"; 
        const GITHUB_REPO = "nevergetoveryou";       
        const AD_FOLDER_PATH = "Advertisements";

        // --- MARQUEE SPEED CONFIGURATION ---
        // Lower numbers make it slide FASTER. Higher numbers make it SLOWER. (Pixels covered per frame calculation)
        const MARQUEE_SPEED = 2.5; 
        
        // Safety gap space (in pixels) between sentences so they don't crash into each other
        const MARQUEE_GAP = 120; 

        // --- EDITABLE SENTENCES TABLE ---
        const randomSentences = [
            "Welcome to G.T.A. kid.. If you have dreams... consider them gone.",
            "Hercules Hercules!",
            "Korolotosophonic parasitic creations of god!",
            "Multeralastic KneeKiller, a contagious disease spreading through Rigorlia!",
            "Water Pacific creating is found new Pulpetalios! Nice What Creatures?.."
        ];

        let horizontalAds = [];
        let verticalAds = [];

        function getRandomElement(arr) {
            if (arr.length === 0) return '';
            const randomIndex = Math.floor(Math.random() * arr.length);
            return arr[randomIndex];
        }

        // Custom Queue-Based Marquee Engine
        function initSeamlessMarquee() {
            const container = document.getElementById('marqueeWrapper');
            const track = document.getElementById('scrollingTrack');
            
            let containerWidth = container.offsetWidth;
            let currentX = containerWidth; 
            let activeSpans = [];

            // Spawns a fresh randomized item into our scrolling array
            function spawnSentenceItem() {
                const span = document.createElement('span');
                span.style.paddingRight = `${MARQUEE_GAP}px`;
                span.style.display = 'inline-block';
                span.textContent = getRandomElement(randomSentences);
                track.appendChild(span);
                
                return {
                    element: span,
                    width: 0, // Calculated post-render
                    computed: false
                };
            }

            // Initialization seed push
            activeSpans.push(spawnSentenceItem());

            function animate() {
                currentX -= MARQUEE_SPEED;
                
                let totalTrackWidth = 0;
                activeSpans.forEach(item => {
                    if (!item.computed) {
                        item.width = item.element.offsetWidth;
                        if (item.width > 0) item.computed = true;
                    }
                    totalTrackWidth += item.width;
                });

                // Check tail end: if the rolling items clear up enough background screen width, load the next random sentence string
                if (currentX + totalTrackWidth < containerWidth + 50) {
                    activeSpans.push(spawnSentenceItem());
                }

                // Cleanup cycle: garbage collect text elements that fully passed left side offscreen coordinates
                if (activeSpans.length > 0 && currentX + activeSpans[0].width < 0) {
                    currentX += activeSpans[0].width;
                    activeSpans[0].element.remove();
                    activeSpans.shift();
                }

                track.style.transform = `translateX(${currentX}px)`;
                requestAnimationFrame(animate);
            }

            // Window resize handler adjustment check
            window.addEventListener('resize', () => {
                containerWidth = container.offsetWidth;
            });

            requestAnimationFrame(animate);
        }

        // Generates structural vertical elements dynamically
        function generateSideAds(containerId, count) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            
            for (let i = 0; i < count; i++) {
                const adBox = document.createElement('div');
                adBox.className = 'side-ad-box';
                
                const adLink = document.createElement('a');
                adLink.href = '#';
                
                const adImg = document.createElement('img');
                adImg.alt = 'Side Advertisement';
                adImg.className = 'dynamic-side-img'; 
                
                adLink.appendChild(adImg);
                adBox.appendChild(adLink);
                container.appendChild(adBox);
            }
        }

        // Fetches from GitHub repository and filters based on filename ending rules
        async function fetchAdsFromGitHub() {
            const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${AD_FOLDER_PATH}`;
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Repository folder missing or private');
                
                const files = await response.json();
                
                files.forEach(file => {
                    if (file.type === 'file' && /\.(gif|png|jpe?g)$/i.test(file.name)) {
                        const localPath = `${AD_FOLDER_PATH}/${file.name}`;
                        const nameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.'));
                        
                        if (nameWithoutExt.toLowerCase().endsWith('_h')) {
                            horizontalAds.push(localPath);
                        } else if (nameWithoutExt.toLowerCase().endsWith('_v')) {
                            verticalAds.push(localPath);
                        }
                    }
                });

            } catch (error) {
                console.warn("Could not read GitHub repository contents directly.", error);
            } finally {
                if (horizontalAds.length > 0) {
                    document.getElementById('topAdImg').src = getRandomElement(horizontalAds);
                    document.getElementById('bottomAdImg').src = getRandomElement(horizontalAds);
                }
                
                if (verticalAds.length > 0) {
                    document.querySelectorAll('.dynamic-side-img').forEach(img => {
                        img.src = getRandomElement(verticalAds);
                    });
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initSeamlessMarquee();
            generateSideAds('leftAdContainer', SIDE_AD_COUNT);
            generateSideAds('rightAdContainer', SIDE_AD_COUNT);
            fetchAdsFromGitHub();
        });

        document.getElementById('actionBtn').addEventListener('click', function() {
            const time = new Date().toLocaleTimeString();
            document.getElementById('message').innerHTML = `★ SUCCESS! ★ LINK ESTABLISHED AT: ${time}`;
            
            const currentCount = parseInt(document.getElementById('countBox').textContent, 10);
            document.getElementById('countBox').textContent = String(currentCount + 1).padStart(7, '0');
        });
    </script>

</body>
</html>
